<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autoPlaya v2 - Gestión de Patio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .sidebar-active {
            background-color: rgba(255, 255, 255, 0.08);
            border-left: 4px solid #3b82f6;
            /* Azul sutil */
            color: white !important;
        }

        .sidebar-active i {
            color: #3b82f6 !important;
        }

        /* Compatibilidad Drag & Drop en Tablets */
        .photo-item {
            -webkit-touch-callout: none !important;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .photo-item img {
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* Custom scrollbar para estética ejecutiva */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
        }
    </style>

    <!-- Auth Guard: Bloqueo de parpadeo y redirección rápida -->
    <script type="module">
        import { supabase } from './js/api/supabase.js';
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.replace('login.html');
        } else {
            document.body.style.visibility = 'visible';
            document.body.style.opacity = '1';
        }
    </script>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Overlay para móviles -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300">
    </div>

    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside id="sidebar"
            class="fixed md:sticky top-0 w-72 bg-slate-900 text-white h-screen z-50 -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl md:shadow-none">

            <div class="bg-white py-10 px-6 flex justify-center items-center relative shrink-0">
                <button id="btnCloseSidebar"
                    class="md:hidden absolute right-6 top-6 text-slate-900 text-2xl font-light focus:outline-none">&times;</button>
                <img src="./img/logo.png" class="h-16 w-auto object-contain" alt="autoPlaya v2">
            </div>

            <nav class="mt-6 px-4 space-y-1.5 flex-grow overflow-y-auto custom-scrollbar">
                <a href="#" id="navReports"
                    class="flex items-center p-4 rounded-2xl sidebar-active transition font-bold group">
                    <i data-lucide="bar-chart-3" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Reportes</span>
                </a>
                <a href="#" id="navInventory"
                    class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                    <i data-lucide="layout-grid" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Inventario</span>
                </a>
                <a href="#" id="navClients"
                    class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                    <i data-lucide="users" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Clientes</span>
                </a>
                <a href="#" id="navSales"
                    class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                    <i data-lucide="briefcase" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Ventas</span>
                </a>
                <a href="#" id="navCollections"
                    class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                    <i data-lucide="wallet" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Caja</span>
                </a>
                <a href="#" id="navHistory"
                    class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                    <i data-lucide="history" class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                        stroke-width="1.5"></i>
                    <span class="text-sm uppercase tracking-wider">Historial</span>
                </a>

                <div id="adminMenu" class="hidden border-t border-white/5 pt-4 mt-2">
                    <p class="px-4 text-[10px] font-black text-slate-600 uppercase tracking-widest mb-2">Administración
                    </p>
                    <a href="#" id="navConfig"
                        class="flex items-center p-4 rounded-2xl hover:bg-white/5 transition font-bold text-gray-400 hover:text-white group">
                        <i data-lucide="settings"
                            class="mr-3 text-slate-400 group-hover:text-blue-400 transition-colors"
                            stroke-width="1.5"></i>
                        <span class="text-sm uppercase tracking-wider">Configuración</span>
                    </a>
                </div>
            </nav>

            <!-- Perfil de Usuario en Sidebar -->
            <div class="mt-auto p-6 border-t border-white/5 bg-slate-900/50">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <div id="userAvatar"
                        class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-xs font-black shadow-lg shadow-blue-600/30 uppercase">
                        --
                    </div>
                    <div class="flex-1 min-w-0">
                        <p id="userName" class="text-[13px] font-black text-white truncate uppercase tracking-tight">
                            Cargando...</p>
                        <p id="userRole" class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-0.5">
                            Vendedor</p>
                    </div>
                </div>
                <button id="btnLogout"
                    class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 hover:bg-red-500/10 hover:text-red-400 text-slate-400 transition-all rounded-2xl font-bold text-xs uppercase tracking-widest group">
                    <i data-lucide="log-out" class="w-4 h-4 group-hover:translate-x-1 transition-transform"
                        stroke-width="2"></i>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Header Mejorado (Persistente y Responsivo) -->
            <header class="bg-white shadow-sm border-b border-gray-100 z-30 sticky top-0">
                <div class="p-3 md:p-4 flex flex-col gap-3">
                    <!-- Fila Superior: Título y Navegación -->
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <button id="btnToggleSidebar"
                                class="md:hidden p-2.5 bg-slate-50 rounded-xl text-slate-800 hover:bg-slate-100 transition shadow-sm border border-slate-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                        d="M4 6h16M4 12h16M4 18h16" />
                                </svg>
                            </button>
                            <h2 id="sectionTitle"
                                class="text-sm md:text-lg font-black text-slate-900 uppercase tracking-tighter">
                                Inventario</h2>
                        </div>

                        <div class="flex items-center gap-2">
                            <span id="vehicleCount"
                                class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-lg border border-blue-100 uppercase hidden sm:block">
                                0 Vehículos
                            </span>
                            <button id="btnNewVehicle"
                                class="relative z-40 bg-blue-600 hover:bg-blue-700 text-white p-2 md:px-4 md:py-2 rounded-xl shadow-lg shadow-blue-600/20 transition flex items-center gap-2 active:scale-95">
                                <span class="text-xl leading-none font-bold">+</span>
                                <span class="hidden md:block font-bold text-xs uppercase tracking-widest">Cargar
                                    Nuevo</span>
                            </button>
                        </div>
                    </div>

                    <!-- Fila Inferior: Buscador y Filtro (Visibles siempre) -->
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1 group">
                            <input type="text" id="searchVehicle" placeholder="BUSCAR..."
                                class="w-full pl-9 pr-4 py-2.5 md:py-3 bg-slate-50 border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-inner text-xs md:text-sm font-bold placeholder:text-slate-400 placeholder:font-bold">
                            <span
                                class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">🔍</span>
                        </div>

                        <select id="filterLocal"
                            class="w-32 md:w-48 bg-slate-50 border-transparent text-slate-600 text-[10px] md:text-xs font-black rounded-2xl pl-3 pr-8 py-2.5 md:py-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer shadow-inner appearance-none truncate">
                            <option value="">TODOS LOS LOCALES</option>
                        </select>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <section id="mainContent" class="p-4 md:p-8">
                <!-- El contenido se carga dinámicamente vía main.js -->
                <div class="flex items-center justify-center h-64">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
