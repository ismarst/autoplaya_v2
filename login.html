<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - autoPlaya v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        @keyframes blob {
            0% {
                transform: scale(1);
            }

            33% {
                transform: scale(1.1);
            }

            66% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4 overflow-hidden relative">
    <!-- Decoración de fondo -->
    <div
        class="absolute top-0 -left-10 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-10 animate-blob">
    </div>
    <div
        class="absolute bottom-0 -right-10 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-10 animate-blob animation-delay-2000">
    </div>

    <div
        class="bg-white/5 backdrop-blur-2xl p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-white/10 relative z-10">
        <div class="text-center mb-10">
            <div class="mb-6 -mx-10 bg-white py-6 flex justify-center items-center shadow-sm">
                <img id="app-logo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="h-16 w-auto object-contain opacity-0 transition-opacity duration-300" alt="Logo">
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight uppercase">Acceso a la <span
                    class="text-blue-500">Solución</span></h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">Gestión amigable y profesional</p>
        </div>

        <form id="formLogin" class="space-y-5">
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Email
                    Usuario</label>
                <div class="relative">
                    <input type="email" id="email" required placeholder="tu@email.com"
                        class="w-full pl-5 pr-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-gray-600 font-semibold">
                </div>
            </div>
            <div class="space-y-2">
                <label
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-gray-600 font-semibold">
            </div>

            <button type="submit" id="btnLogin"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-600/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-3 text-xs uppercase tracking-widest mt-4">
                <span>Ingresar ahora</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 text-center">
            <p class="text-sm text-gray-500 italic">"Potenciando tu negocio ágilmente"</p>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/api/supabase.js';
        import { notifier } from './js/utils/notifier.js';
        import { CONFIG } from './js/config.js';
        import { tenantService } from './js/api/tenantService.js';

        const form = document.getElementById('formLogin');
        const btn = document.getElementById('btnLogin');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 border-4 border-white border-t-transparent rounded-full" viewBox="0 0 24 24"></svg> Verificando...`;

            try {
                // 1. Intentar Login
                const { data, error: authError } = await supabase.auth.signInWithPassword({ email, password });
                if (authError) throw authError;

                // 2. Verificar pertenencia a la Playa (Tenant Check)
                const { data: perfil, error: profileError } = await supabase
                    .from('perfiles')
                    .select('playa_id')
                    .eq('id', data.user.id)
                    .single();

                const currentPlayaId = tenantService.getPlayaId();

                if (profileError || !perfil || perfil.playa_id !== currentPlayaId) {
                    // Si no pertenece a esta playa, cerramos sesión inmediatamente
                    await supabase.auth.signOut();
                    throw new Error('Credenciales inválidas para este dominio.');
                }

                notifier.showToast('¡Bienvenido a la Solución!');
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (error) {
                // Mensaje genérico para no dar pistas a atacantes
                const msg = error.message === 'Credenciales inválidas para este dominio.' 
                    ? 'Error de acceso: Usuario o contraseña incorrectos' 
                    : 'Error de acceso: ' + error.message;
                
                notifier.showToast(msg, 'error');
                btn.disabled = false;
                btn.innerHTML = `<span>Acceder al Panel</span> <span class="text-xl">→</span>`;
            }
        };

        // Redirigir si ya existe sesión activa + Identificar Inquilino
        const initLogin = async () => {
            const config = await tenantService.identify();
            if (!config) {
                document.body.innerHTML = `<div class="h-screen flex items-center justify-center bg-slate-900 text-white font-bold p-8 text-center">
                    <div>
                        <div class="text-red-500 text-5xl mb-4">⚠️</div>
                        <h1 class="text-2xl mb-2">Dominio no registrado</h1>
                        <p class="text-gray-400">Este dominio no está vinculado a ninguna playa de autoPlaya v2.</p>
                    </div>
                </div>`;
                return;
            }

            // Marca Blanca: Actualizar nombre comercial y LOGO
            const titleEl = document.querySelector('h1');
            if (titleEl) titleEl.textContent = config.nombre_comercial;

            const logoEl = document.getElementById('app-logo');
            if (logoEl && config.logo_url) {
                logoEl.src = config.logo_url;
                logoEl.classList.remove('opacity-0');
            }

            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'index.html';
        };

        initLogin();
    </script>
</body>

</html>
