<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo de Vehículos | autoPlaya</title>
    
    <!-- CSS y Config Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Ocultar barra de scroll en contenedores específicos */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones para el Modal Tipo App */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        .backdrop {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">
    
    <!-- Header Fijo -->
    <header class="sticky top-0 z-40 bg-white shadow-sm border-b border-slate-100 px-4 py-3">
        <div class="relative flex items-center justify-center mb-4 min-h-[48px]">
            <!-- Logotipo Centrado y más grande -->
            <img id="app-logo" src="./img/logo.png" alt="Logo" class="h-12 object-contain">
            
            <!-- Botón WhatsApp a la derecha -->
            <a href="https://wa.me/59599999999" target="_blank" class="absolute right-0 p-1 focus:outline-none active:scale-95 flex items-center justify-center">
                <img src="./img/whatsapp.svg" alt="WhatsApp" class="w-10 h-10">
            </a>
        </div>
        
        <!-- Buscador -->
        <div class="relative w-full">
            <input type="text" id="searchInput" placeholder="Ingrese modelo, marca o año..." 
                   class="w-full pl-10 pr-4 py-3 bg-slate-100/80 border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-xs font-bold text-slate-700 placeholder:text-slate-400">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="search" class="w-4 h-4"></i>
            </span>
        </div>
    </header>

    <!-- Subtitle / Meta -->
    <div class="px-4 py-4 flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest">
        <span>Catálogo Disponible</span>
        <span id="vehicleCount">--</span>
    </div>

    <!-- Grid de Vehículos -->
    <main class="px-4 pb-8">
        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cargando dinámicamente... -->
        </div>
    </main>

    <!-- Modal Base (Bottom Sheet) -->
    <div id="modalBackdrop" class="backdrop fixed inset-0 bg-slate-900/40 z-50 backdrop-blur-sm"></div>
    <div id="vehicleModal" class="bottom-sheet fixed inset-x-0 bottom-0 z-[60] bg-white rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col max-h-[95vh]">
        <!-- Handler para deslizar hacia abajo -->
        <div class="shrink-0 pt-4 pb-2 px-6 flex justify-between items-center border-b border-slate-50 bg-white shadow-sm">
            <div id="closeModalBtn" class="p-2 -ml-2 rounded-full hover:bg-slate-50 text-slate-400 cursor-pointer transition-colors">
                <i data-lucide="chevron-down" class="w-6 h-6"></i>
            </div>
            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Detalle</span>
            <div class="w-10"></div> <!-- Espaciador para centrar título -->
        </div>

        <!-- Contenido Especifico del Modal (Inyectado por JS) -->
        <div id="modalContent" class="overflow-y-auto w-full no-scrollbar pb-24 relative flex-1">
            <!-- El HTML dinámico irá aquí -->
        </div>
    </div>

    <!-- Footer (Solo al final del scroll) -->
    <footer class="bg-white border-t border-slate-100 pt-10 pb-6 px-4">
        <div class="max-w-xl mx-auto space-y-8">
            <!-- Info de Contacto -->
            <div class="space-y-4">
                <div class="flex items-center gap-4 group">
                    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 transition-colors">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Dirección</p>
                        <p class="text-sm font-bold text-slate-700">Avda. Alas Paraguayas Nº 1234</p>
                    </div>
                </div>

                <a href="https://wa.me/595981123123" target="_blank" class="flex items-center gap-4 group">
                    <div class="w-10 h-10 rounded-2xl bg-green-50 flex items-center justify-center text-green-600 transition-colors group-hover:bg-green-100">
                        <img src="./img/whatsapp.svg" class="w-6 h-6" alt="WA">
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Contacto</p>
                        <p class="text-sm font-bold text-slate-700">+595981123123</p>
                    </div>
                </a>

                <div class="flex items-center gap-4 group">
                    <div class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-500 transition-colors">
                        <i data-lucide="clock" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Horarios de atención</p>
                        <p class="text-sm font-bold text-slate-700 uppercase">Lun a Sáb de 7AM a 6PM</p>
                    </div>
                </div>
            </div>

            <!-- Mapa (Placeholder Estético) -->
            <div class="w-full h-48 rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-sm relative group cursor-pointer">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3606.848834994244!2d-57.58782972505505!3d-25.309268827599054!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x945da9001b9134bf%3A0xf639a04a5840df5f!2sAsunci%C3%B3n!5e0!3m2!1ses!2spy!4v1710892543981!5m2!1ses!2spy" 
                        class="w-full h-full border-0 grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all" 
                        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                <div class="absolute inset-0 pointer-events-none flex items-center justify-center bg-black/5 group-hover:bg-transparent transition-colors">
                    <span class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg border border-white/50">Abrir Mapa</span>
                </div>
            </div>

            <!-- Créditos -->
            <div class="pt-8 border-t border-slate-50 text-center">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Desarrollado por <span class="text-slate-900 border-b-2 border-blue-600 pb-0.5">Escalable 2026</span></p>
            </div>
        </div>
    </footer>

    <!-- Script Principal -->
    <script type="module" src="./js/public/catalogUI.js"></script>
</body>
</html>
