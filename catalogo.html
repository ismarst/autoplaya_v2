<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo de Vehículos | autoPlaya</title>

    <!-- CSS y Config Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ocultar barra de scroll en contenedores específicos */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animaciones para el Modal Tipo App */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .backdrop {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Header Fijo -->
    <header class="sticky top-0 z-40 bg-white shadow-sm border-b border-slate-100 px-4 py-3">
        <div class="relative flex items-center justify-center mb-4 min-h-[48px]">
            <!-- Logotipo Centrado y más grande -->
            <img id="app-logo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Logo" class="h-12 object-contain opacity-0 transition-opacity duration-300">

            <!-- Botón WhatsApp a la derecha -->
            <a href="https://wa.me/59599999999" target="_blank"
                class="absolute right-0 p-1 focus:outline-none active:scale-95 flex items-center justify-center">
                <img src="./img/whatsapp.svg" alt="WhatsApp" class="w-10 h-10">
            </a>
        </div>

        <!-- Buscador -->
        <div class="relative w-full">
            <input type="text" id="searchInput" placeholder="Ingrese modelo, marca o año..."
                class="w-full pl-10 pr-4 py-3 bg-slate-100/80 border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-xs font-bold text-slate-700 placeholder:text-slate-400">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="search" class="w-4 h-4"></i>
            </span>
        </div>

        <!-- Selector de Sucursal (Filtro) -->
        <div class="mt-4 px-1">
            <div class="relative">
                <select id="branchSelect"
                    class="w-full appearance-none bg-slate-50 border border-slate-100 text-slate-700 text-[10px] font-black uppercase tracking-widest px-10 py-3 rounded-2xl focus:ring-2 focus:ring-blue-500/10 outline-none transition-all cursor-pointer">
                    <option value="all">📍 Todos los locales</option>
                </select>
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-600">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                </div>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Subtitle / Meta -->
    <div class="px-4 py-4 flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest">
        <span>Catálogo Disponible</span>
        <span id="vehicleCount">--</span>
    </div>

    <!-- Grid de Vehículos -->
    <main class="px-4 pb-8">
        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cargando dinámicamente... -->
        </div>
    </main>

    <!-- Modal Base (Bottom Sheet) -->
    <div id="modalBackdrop" class="backdrop fixed inset-0 bg-slate-900/40 z-50 backdrop-blur-sm"></div>
    <div id="vehicleModal"
        class="bottom-sheet fixed inset-x-0 bottom-0 z-[60] bg-white rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col max-h-[95vh]">
        <!-- Handler para deslizar hacia abajo -->
        <div
            class="shrink-0 pt-4 pb-2 px-6 flex justify-between items-center border-b border-slate-50 bg-white shadow-sm">
            <div id="closeModalBtn"
                class="p-2 -ml-2 rounded-full hover:bg-slate-50 text-slate-400 cursor-pointer transition-colors">
                <i data-lucide="chevron-down" class="w-6 h-6"></i>
            </div>
            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Detalle</span>
            <div class="w-10"></div> <!-- Espaciador para centrar título -->
        </div>

        <!-- Contenido Especifico del Modal (Inyectado por JS) -->
        <div id="modalContent" class="overflow-y-auto w-full no-scrollbar pb-24 relative flex-1">
            <!-- El HTML dinámico irá aquí -->
        </div>
    </div>

    <!-- Footer Dinámico -->
    <footer class="bg-white border-t border-slate-100 pt-12 pb-10 px-6">
        <div id="footerBranchesContainer" class="max-w-xl mx-auto space-y-12">
            <!-- Las sucursales se inyectarán dinámicamente aquí -->
        </div>

        <div class="max-w-xl mx-auto pt-10 mt-10 border-t border-slate-50 text-center">
            <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Desarrollado por <span
                    class="text-slate-900 border-b-2 border-blue-600 pb-0.5">ESCALABLE</span></p>
        </div>
    </footer>

    <!-- Script Principal -->
    <script type="module" src="./js/public/catalogUI.js"></script>
</body>

</html>
